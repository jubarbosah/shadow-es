<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF6F4" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Shadow ES — corretor de espanhol</title>
  <style>
    :root{
      --bg:#FAF6F4; --card:#FFFFFF; --muted:#8B8285; --text:#211A1C;
      --accent:#8A1C34; --accent-lt:#B03651; --ok:#15803D; --err:#DC2626; --line:#ECE4E0; --gold:#B45309;
      --shadow:0 1px 2px rgba(33,20,25,.05), 0 10px 26px rgba(33,20,25,.07);
      --shadow-accent:0 6px 16px rgba(138,28,52,.26);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%}
    body{
      background:var(--bg);color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      -webkit-font-smoothing:antialiased;
      display:flex;flex-direction:column;min-height:100dvh;
      padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 2px 8px}
    header h1{font-size:16px;margin:0;font-weight:800;letter-spacing:-.01em}
    .tabs{display:flex;gap:6px}
    .tab{background:#F0E7E3;color:var(--muted);border:none;border-radius:999px;padding:7px 14px;font:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:background .15s}
    .tab.active{background:var(--accent);color:#fff}
    main{flex:1;display:flex;flex-direction:column;max-width:520px;width:100%;margin:0 auto}
    .view{display:none;flex:1;flex-direction:column}
    .view.active{display:flex}
    #practice,#reviewPanel{justify-content:center;gap:16px}
    #practice{flex:1;justify-content:center}

    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 20px;box-shadow:var(--shadow)}
    .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px}
    .es{font-size:30px;font-weight:800;line-height:1.16;letter-spacing:-.02em;text-wrap:balance}
    .pt{color:var(--muted);font-size:15px;margin-top:8px}
    .note{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--text);margin-top:12px;line-height:1.45}
    .note:empty{display:none}
    .said{color:var(--muted);font-size:13px;font-style:italic;margin-top:10px}
    .status{text-align:center;font-size:16px;font-weight:700;min-height:22px}
    .status.ok{color:var(--ok)} .status.err{color:var(--err)} .status.info{color:var(--accent-lt)}

    /* feedback / nota */
    .fb{display:flex;flex-direction:column;align-items:center;text-align:center;margin-top:2px}
    .fb:empty{display:none}
    .said-words{font-size:20px;font-weight:800;letter-spacing:-.01em;line-height:1.3;margin-bottom:6px}
    .fb .w.ok{color:var(--ok)}
    .fb .w.warn{color:var(--gold)}
    .fb .w.bad{color:var(--err);text-decoration:underline;text-decoration-style:wavy;text-underline-offset:3px}
    .ring{position:relative;width:150px;height:150px;margin:4px auto 2px}
    .ring svg{transform:rotate(-90deg);width:150px;height:150px}
    .ring-bg{fill:none;stroke:var(--line);stroke-width:12}
    .ring-fg{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
    .ring-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .ring-num{font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
    .ring-den{font-size:12px;color:var(--muted);margin-top:2px}
    .verdict{font-size:15px;font-weight:700;margin-top:2px}
    .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
    .chip{font-size:11.5px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-variant-numeric:tabular-nums}
    .src{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-top:10px}
    .src .ic{width:14px;height:14px}

    .guide{text-align:center;color:var(--accent-lt);font-size:14.5px;font-weight:600;line-height:1.45;margin:2px 6px}
    .guide:empty{display:none}
    .placeholder{text-align:center;color:var(--text);font-size:19px;font-weight:600;padding:10px 8px;line-height:1.45;text-wrap:balance}
    .placeholder b{color:var(--accent)}

    /* botões */
    .controls{display:flex;gap:10px}
    .controls .btn{flex:1}
    button.btn{display:flex;align-items:center;justify-content:center;gap:8px;font:inherit;font-weight:700;
      border:1px solid var(--line);border-radius:16px;padding:15px;cursor:pointer;color:var(--text);background:#fff;
      box-shadow:var(--shadow);transition:transform .05s}
    button.btn:active{transform:scale(.97)}
    button.btn:disabled{opacity:.45;box-shadow:none}
    button.btn .ic{width:20px;height:20px;flex:none}
    .mic{background:var(--accent);color:#fff;border-color:transparent;font-size:16px;box-shadow:var(--shadow-accent)}
    .ghost{background:#fff;color:var(--text)}
    .small{font-size:13px;padding:12px}
    .btn.listening{animation:soft 1.3s ease-in-out infinite}
    .ldot{width:9px;height:9px;border-radius:50%;background:currentColor;display:inline-block;animation:blink 1s infinite}
    @keyframes blink{50%{opacity:.3}}
    @keyframes soft{50%{opacity:.82}}
    @media (prefers-reduced-motion:reduce){.btn.listening,.ldot{animation:none}}

    /* ações secundárias = mini-cartões verticais */
    #secondary .btn{flex-direction:column;gap:5px;padding:10px 4px;font-size:11px;font-weight:600;color:var(--muted)}
    #secondary .btn .ic{width:20px;height:20px;color:var(--accent)}
    #secondary .btn.mic{color:#fff}
    #secondary .btn.mic .ic{color:#fff}

    /* explicação */
    #explainBox{display:none;margin-top:4px}
    #explainBox .ex{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;display:flex;gap:8px;align-items:center;box-shadow:var(--shadow)}
    #explainBox .ex .t{flex:1}
    #explainBox .ex .ees{font-weight:700}
    #explainBox .ex .ept{color:var(--muted);font-size:13px}
    #explainBox .ex button{background:#F0E7E3;border:none;color:var(--accent);border-radius:9px;padding:8px;cursor:pointer;display:flex}
    #explainBox .ex button .ic{width:18px;height:18px}

    /* input de captura */
    #captureInput{width:100%;background:#FBF8F6;border:1px solid var(--line);border-radius:12px;color:var(--text);
      font:inherit;font-size:18px;font-weight:700;padding:13px;margin-top:8px}
    #captureInput:focus{outline:none;border-color:var(--accent)}

    /* cards */
    #cardList{overflow:auto}
    .dayhdr{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin:14px 2px 8px}
    .fc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;display:flex;align-items:center;gap:8px;margin-bottom:8px;box-shadow:var(--shadow)}
    .fc .txt{flex:1;min-width:0}
    .fc .fes{font-weight:700;font-size:15px}
    .fc .fpt{color:var(--muted);font-size:13px;margin-top:2px}
    .fc .due{font-size:11px;color:var(--muted);margin-top:3px}
    .fc button{background:#F0E7E3;border:none;color:var(--accent);border-radius:10px;padding:9px;cursor:pointer;flex:none;display:flex}
    .fc button .ic{width:18px;height:18px}
    .empty{text-align:center;color:var(--muted);padding:30px 10px;line-height:1.5}
    .reviewbar{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:16px;font:inherit;font-weight:800;font-size:16px;cursor:pointer;width:100%;margin:8px 0 12px;box-shadow:var(--shadow-accent)}
    .reviewbar .ic{width:20px;height:20px}
    .reviewbar.none{background:#fff;color:var(--muted);border:1px solid var(--line);cursor:default;box-shadow:none}
    footer{color:var(--muted);font-size:12px;text-align:center;padding:10px}
  </style>
</head>
<body>
  <header>
    <h1>Shadow&nbsp;ES</h1>
    <div class="tabs">
      <button class="tab active" id="tabPractice">Praticar</button>
      <button class="tab" id="tabCards">Cards <span id="cardCount">0</span></button>
    </div>
  </header>

  <main>
    <!-- ============ PRATICAR ============ -->
    <section class="view active" id="practice">
      <div class="card" id="resultCard">
        <div class="placeholder" id="placeholder">
          Fale uma frase em espanhol e eu te devolvo a <b>forma certa</b> para você repetir.
        </div>
        <div id="result" style="display:none">
          <div class="label">Forma correta</div>
          <div class="es" id="es">—</div>
          <div class="pt" id="pt"></div>
          <div class="note" id="note"></div>
          <div class="said" id="said"></div>
          <div id="explainBox">
            <div class="note" id="explanation" style="border-left-color:var(--accent-lt)"></div>
            <div id="examples"></div>
          </div>
        </div>
      </div>

      <!-- transcrição editável (confira/ajuste antes de corrigir) -->
      <div class="card" id="captureBox" style="display:none;padding:16px">
        <div class="label" id="captureLabel">Você disse — confira e ajuste se precisar</div>
        <input id="captureInput" type="text" lang="es" autocomplete="off" autocapitalize="sentences" spellcheck="false"
          placeholder="Digite ou corrija a frase em espanhol…" />
        <div class="controls" style="margin-top:10px">
          <button class="btn ghost small" id="captureRedo"></button>
          <button class="btn mic small" id="captureSend" style="flex:2"></button>
        </div>
      </div>

      <div class="status" id="status"></div>
      <div class="fb" id="shadowFb"></div>

      <!-- fluxo guiado: uma linha que diz o que fazer + 1 ação principal + secundárias -->
      <div id="mainControls">
        <div class="guide" id="guide"></div>
        <div class="controls">
          <button class="btn mic" id="primary"></button>
        </div>
        <div class="controls" id="secondary"></div>
      </div>
    </section>

    <!-- ============ CARDS ============ -->
    <section class="view" id="cards">
      <button class="reviewbar" id="reviewBar"></button>
      <div id="cardList"></div>

      <!-- painel de revisão -->
      <div id="reviewPanel" style="display:none">
        <div class="card">
          <div class="label">Revisão · <span id="rvLeft">0</span> restantes</div>
          <div class="pt" id="rvPt" style="font-size:17px;color:var(--text)"></div>
          <div class="es" id="rvEs" style="filter:blur(8px);margin-top:10px">—</div>
          <div class="note" id="rvNote"></div>
        </div>
        <div class="status" id="rvStatus"></div>
        <div class="fb" id="rvFb"></div>
        <div class="controls">
          <button class="btn ghost" id="rvShow"></button>
          <button class="btn mic" id="rvRepeat"></button>
        </div>
        <div class="controls" id="rvGrades" style="display:none">
          <button class="btn small" id="rvAgain" style="color:var(--err)">De novo</button>
          <button class="btn small" id="rvGood">Bom</button>
          <button class="btn small" id="rvEasy" style="color:var(--ok)">Fácil</button>
        </div>
        <div class="controls"><button class="btn ghost small" id="rvQuit">Sair da revisão</button></div>
      </div>
    </section>
  </main>

  <footer id="foot">Shadow ES · <b>v14</b> · correção · pronúncia · revisão</footer>

  <script>
  // se o SDK da Azure não carregar pela URL principal, tenta um CDN alternativo
  function azSdkFallback(){
    if(window.SpeechSDK) return;
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1.40.0/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js';
    document.head.appendChild(s);
  }
  </script>
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw" onerror="azSdkFallback()"></script>
  <script>
  const API_URL = "https://shadow-es.juniaclourenco.workers.dev";
  const $ = id => document.getElementById(id);
  const DAY = 86400000;
  let current = null;                 // resultado atual (praticar)
  let recMode = null;                 // 'capture' | 'shadow'
  let listening = false;
  let shadowTarget=null, shadowStatusEl=null, shadowMicBtn=null, shadowFbEl=null, shadowOnDone=null, shadowOnFail=null;
  let micWatch=null, shadowCanceled=false;

  // -------- Ícones de linha (SVG) --------
  const ICN={
    mic:'<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0"/><path d="M12 17v3"/>',
    speaker:'<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M17 8a5 5 0 0 1 0 8"/>',
    pencil:'<path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17v3z"/><path d="M13.5 6.5l3 3"/>',
    question:'<circle cx="12" cy="12" r="9"/><path d="M9.2 9.3a2.8 2.8 0 0 1 5.4 1c0 1.9-2.6 2.3-2.6 3.7"/><path d="M12 17h.01"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    keyboard:'<rect x="3" y="6" width="18" height="12" rx="2"/><path d="M7 10h.01M11 10h.01M15 10h.01M7 14h10"/>',
    repeat:'<path d="M4 12a8 8 0 0 1 13-6l3 2"/><path d="M20 4v4h-4"/><path d="M20 12a8 8 0 0 1-13 6l-3-2"/><path d="M4 20v-4h4"/>',
    check:'<path d="M5 12l4 4L19 7"/>',
    target:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.5"/>',
    play:'<path d="M8 6l10 6-10 6z"/>',
    trash:'<path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M6.5 7l1 13h9l1-13"/>'
  };
  function ic(name){ return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(ICN[name]||'')+'</svg>'; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // -------- Voz (TTS) --------
  let esVoice=null;
  function pickVoice(){ const vs=speechSynthesis.getVoices(); esVoice=vs.find(v=>/es-ES/i.test(v.lang))||vs.find(v=>/^es/i.test(v.lang))||null; }
  if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
  function speak(text, rate=0.95){ if(!('speechSynthesis'in window)||!text)return; speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang='es-ES'; u.rate=rate; if(esVoice)u.voice=esVoice; speechSynthesis.speak(u); }

  // -------- Comparação tolerante --------
  function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[¿¡?!.,;:"'()]/g,' ').replace(/\s+/g,' ').trim(); }
  function lev(a,b){ const m=a.length,n=b.length,d=Array.from({length:m+1},(_,x)=>[x,...Array(n).fill(0)]);
    for(let j=0;j<=n;j++)d[0][j]=j; for(let x=1;x<=m;x++)for(let y=1;y<=n;y++)d[x][y]=Math.min(d[x-1][y]+1,d[x][y-1]+1,d[x-1][y-1]+(a[x-1]===b[y-1]?0:1)); return d[m][n]; }
  function sim(a,b){ a=norm(a);b=norm(b); if(!a||!b)return 0; return 1-lev(a,b)/Math.max(a.length,b.length); }
  // alinhamento palavra-a-palavra (LCS) -> quais palavras do alvo foram ditas
  function alignWords(t,s){
    const m=t.length,n=s.length, dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++) dp[i][j]= t[i-1]===s[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    const matched=new Array(m).fill(false); let i=m,j=n;
    while(i>0&&j>0){ if(t[i-1]===s[j-1]){matched[i-1]=true;i--;j--;} else if(dp[i-1][j]>=dp[i][j-1])i--; else j--; }
    return matched;
  }
  function scoreColor(v){ return v>=75?'var(--ok)':v>=60?'var(--gold)':'var(--err)'; }
  // anel de nota (SVG)
  function ringHTML(score,label,color){
    const r=62, C=2*Math.PI*r, off=C*(1-Math.max(0,Math.min(100,score))/100);
    return '<div class="ring"><svg viewBox="0 0 150 150">'
      +'<circle class="ring-bg" cx="75" cy="75" r="'+r+'"/>'
      +'<circle class="ring-fg" cx="75" cy="75" r="'+r+'" style="stroke:'+color+';stroke-dasharray:'+C.toFixed(1)+';stroke-dashoffset:'+off.toFixed(1)+'"/>'
      +'</svg><div class="ring-val"><div class="ring-num" style="color:'+color+'">'+score+'</div><div class="ring-den">'+label+'</div></div></div>';
  }
  // Plano B (modo básico): compara palavras reconhecidas com o alvo
  function renderScore(fbEl, statusEl, said, target){
    const t=norm(target).split(' ').filter(Boolean);
    const matched=alignWords(t, norm(said||'').split(' ').filter(Boolean));
    const nOk=matched.filter(Boolean).length;
    const pct=Math.round(100*nOk/Math.max(1,t.length));
    if(statusEl) setEl(statusEl,'','');
    const col=scoreColor(pct);
    let ti=0, wordsStr='';
    for(const w of target.split(/\s+/)){ const nw=norm(w); let cls=''; if(nw){cls=matched[ti]?'ok':'bad';ti++;} wordsStr+='<span class="w '+cls+'">'+esc(w)+'</span> '; }
    const verdict=pct>=90?'¡Excelente!':pct>=75?'¡Muy bien!':pct>=50?'Casi, repite':'Escucha y repite';
    const sub='Modo básico'+(azFailReason?' · Azure indisponível: '+esc(azFailReason):'');
    fbEl.className='fb';
    fbEl.innerHTML='<div class="said-words">'+wordsStr+'</div>'+ringHTML(pct,'Palavras',col)
      +'<div class="verdict" style="color:'+col+'">'+verdict+'</div>'
      +'<div class="src" style="color:var(--muted)">'+ic('target')+'<span>'+sub+'</span></div>';
    speak(target, pct>=75?0.98:0.85);
  }

  // -------- Reconhecimento --------
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  let rec=null;
  if(SR){
    rec=new SR(); rec.lang='es-ES'; rec.interimResults=false; rec.maxAlternatives=4;
    rec.onresult = e => { const alts=[...e.results[0]].map(r=>r.transcript);
      if(recMode==='capture') onCaptured(alts); else onShadow(alts); };
    rec.onerror = e => { stopMic();
      const el=shadowStatusEl||$('status');
      if(e.error==='no-speech') setEl(el,'info','Não ouvi — toque e fale de novo.');
      else if(e.error==='not-allowed') setEl(el,'err','Libere o microfone nas permissões do site.');
      else setEl(el,'info','Tente de novo.'); };
    rec.onend = () => stopMic();
  }
  function startMic(mode, opts={}){
    if(!rec){ setEl($('status'),'err','Use o Chrome no Android (sem reconhecimento de voz aqui).'); if(opts.onFail)opts.onFail(); return; }
    recMode=mode; shadowTarget=opts.target||null; shadowStatusEl=opts.statusEl||null; shadowMicBtn=opts.micBtn||$('primary'); shadowFbEl=opts.fbEl||null; shadowOnDone=opts.onDone||null; shadowOnFail=opts.onFail||null; shadowCanceled=false;
    if(shadowFbEl) shadowFbEl.innerHTML='';
    listening=true; shadowMicBtn.classList.add('listening'); shadowMicBtn.dataset.oldhtml=shadowMicBtn.innerHTML; shadowMicBtn.innerHTML='<span class="ldot"></span>Ouvindo… (toque p/ parar)';
    setEl(shadowStatusEl||$('status'),'info', mode==='capture'?'Fale sua frase…':'Repita a frase…');
    try{ rec.start(); }
    catch(e){ // já ativo/erro -> não deixa preso
      const f=shadowOnFail; stopMic(); setEl(shadowStatusEl||$('status'),'info','Não consegui abrir o microfone — tente de novo.'); if(f)f(); return; }
    // trava-morta: se em 12s nada voltar (nem resultado, nem erro), destrava
    clearTimeout(micWatch);
    micWatch=setTimeout(()=>{ if(!listening)return; const f=shadowOnFail; stopMic();
      setEl(shadowStatusEl||$('status'),'info','Não consegui ouvir — toque e tente de novo.'); if(f)f(); }, 12000);
  }
  function stopMic(){ listening=false; clearTimeout(micWatch); const b=shadowMicBtn||$('primary'); b.classList.remove('listening'); if(b.dataset.oldhtml){b.innerHTML=b.dataset.oldhtml; delete b.dataset.oldhtml;} try{rec&&rec.stop();}catch(_){} }
  function onShadow(alts){
    stopMic(); if(!shadowTarget||shadowCanceled)return;
    let best=-1,bestA=''; for(const a of alts){ const sc=sim(a,shadowTarget); if(sc>best){best=sc;bestA=a;} }
    renderScore(shadowFbEl||$('shadowFb'), shadowStatusEl||$('status'), bestA, shadowTarget);
    if(shadowOnDone){ const cb=shadowOnDone; shadowOnDone=null; cb(); }
  }

  function setEl(el,kind,msg){ el.className='status '+kind; el.textContent=msg; }

  // ================== AZURE — nota de pronúncia (fonema) ==================
  let azTok={token:null,region:null,ts:0};
  let azFailReason='';                 // por que a Azure caiu no Plano B (mostrado na tela)
  let azCancel=null;                   // função pra abortar a avaliação Azure em andamento
  async function getAzToken(){
    const now=Date.now();
    if(azTok.token && now-azTok.ts < 8*60000) return azTok;
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'azToken'})});
    const d=await r.json();
    if(d.error||!d.token) throw new Error(d.error||'sem token');
    azTok={token:d.token,region:d.region,ts:now};
    return azTok;
  }
  // retorna: 'ok' (avaliou) | 'nomatch' (não ouviu) | 'cancel' (você parou) | 'fallback' (Azure indisponível -> Plano B)
  async function azAssess(target, fbEl, statusEl, micBtn){
    azFailReason='';
    const SDK=window.SpeechSDK;
    if(!SDK){ azFailReason='SDK não carregou (rede?)'; return 'fallback'; }
    let tok; try{ tok=await getAzToken(); }catch(e){ azFailReason='token: '+((e&&e.message)||'falhou'); return 'fallback'; }
    let speechConfig, recognizer;
    try{
      speechConfig=SDK.SpeechConfig.fromAuthorizationToken(tok.token, tok.region);
      speechConfig.speechRecognitionLanguage='es-ES';
      const pa=new SDK.PronunciationAssessmentConfig(target,
        SDK.PronunciationAssessmentGradingSystem.HundredMark,
        SDK.PronunciationAssessmentGranularity.Phoneme, true);
      try{ pa.enableProsodyAssessment=true; }catch(_){}
      const audioConfig=SDK.AudioConfig.fromDefaultMicrophoneInput();
      recognizer=new SDK.SpeechRecognizer(speechConfig, audioConfig);
      pa.applyTo(recognizer);
    }catch(e){ azFailReason='config: '+((e&&e.message)||'erro').slice(0,60); return 'fallback'; }

    const oldHtml=micBtn.innerHTML; micBtn.classList.add('listening'); micBtn.innerHTML='<span class="ldot"></span>Ouvindo… (toque p/ parar)';
    setEl(statusEl,'info','Fale agora…'); if(fbEl) fbEl.innerHTML='';
    return new Promise(resolve=>{
      let done=false;
      const finish=(code)=>{
        if(done) return; done=true; azCancel=null; clearTimeout(to);
        micBtn.classList.remove('listening'); micBtn.innerHTML=oldHtml;
        try{ recognizer.close(); }catch(_){}
        resolve(code);
      };
      // rede lenta / mic mudo: destrava sozinho em 15s
      const to=setTimeout(()=>{ azFailReason='sem resposta em 15s'; finish('fallback'); }, 15000);
      // permite abortar tocando no botão enquanto ouve
      azCancel=()=>{ azFailReason='parado por você'; setEl(statusEl,'',''); finish('cancel'); };
      recognizer.recognizeOnceAsync(result=>{
        let code='ok';
        try{
          if(result.reason===SDK.ResultReason.RecognizedSpeech){
            renderAzScore(fbEl, statusEl, SDK.PronunciationAssessmentResult.fromResult(result), target);
          } else if(result.reason===SDK.ResultReason.NoMatch){
            setEl(statusEl,'info','Não ouvi bem — toque em Repetir e tente de novo.'); code='nomatch';
          } else {                     // Canceled (mic/token) -> Plano B
            code='fallback';
            try{ const cd=SDK.CancellationDetails.fromResult(result);
              azFailReason='cancelado: '+((cd&&(cd.errorDetails||cd.reason))||'?').toString().slice(0,60);
            }catch(_){ azFailReason='cancelado ('+result.reason+')'; }
          }
        }catch(e){ code='fallback'; azFailReason='exceção: '+((e&&e.message)||'').slice(0,50); }
        finish(code);
      }, err=>{
        azFailReason='erro: '+((err&&err.toString&&err.toString())||'reconhecedor').slice(0,60);
        finish('fallback');
      });
    });
  }
  function renderAzScore(fbEl, statusEl, pa, target){
    if(statusEl) setEl(statusEl,'','');
    // NOTA PRINCIPAL = PRECISÃO dos sons (o que "pronúncia" realmente é).
    // A média geral da Azure (pronunciationScore) infla por fluência/completude, então não serve de nota.
    const overall=Math.round(pa.accuracyScore!=null?pa.accuracyScore:(pa.pronunciationScore||0));
    const col=scoreColor(overall);
    const words=(pa.detailResult&&pa.detailResult.Words)?pa.detailResult.Words:[];
    let wordsStr='';
    if(words.length){
      for(const w of words){
        const a=w.PronunciationAssessment||{}; const acc=a.AccuracyScore!=null?a.AccuracyScore:100; const er=a.ErrorType||'None';
        let cls='warn'; if(er==='Omission'||acc<60) cls='bad'; else if(acc>=80) cls='ok';
        wordsStr+='<span class="w '+cls+'">'+esc(w.Word)+'</span> ';
      }
    } else { wordsStr=esc(target); }
    const verdict=overall>=90?'¡Excelente!':overall>=75?'¡Muy bien!':overall>=60?'Casi':'Sigue practicando';
    let chips='<span class="chip">Fluência '+Math.round(pa.fluencyScore||0)+'</span><span class="chip">Completude '+Math.round(pa.completenessScore||0)+'</span>';
    if(pa.prosodyScore!=null) chips+='<span class="chip">Prosódia '+Math.round(pa.prosodyScore)+'</span>';
    fbEl.className='fb';
    fbEl.innerHTML='<div class="said-words">'+wordsStr+'</div>'+ringHTML(overall,'Precisión',col)
      +'<div class="verdict" style="color:'+col+'">'+verdict+'</div>'
      +'<div class="chips">'+chips+'</div>'
      +'<div class="src">'+ic('target')+'<span>Avaliado pela Azure</span></div>';
    speak(target, overall>=75?0.98:0.85);
  }

  // ================== PRATICAR ==================
  let lastAlts=[];                    // hipóteses do reconhecedor da última fala
  let lastSent='';                    // o texto que foi realmente enviado ao cérebro

  // ---- fluxo guiado: em cada passo, UMA ação principal óbvia + secundárias ----
  function addBtn(name, label, fn, cls){
    const b=document.createElement('button'); b.className='btn '+(cls||'ghost')+' small'; b.innerHTML=ic(name)+'<span>'+label+'</span>'; b.onclick=fn;
    $('secondary').appendChild(b); return b;
  }
  function setStep(s){
    const prim=$('primary'), sec=$('secondary'), guide=$('guide');
    sec.innerHTML=''; guide.textContent='';
    if(s==='idle'){
      prim.className='btn mic'; prim.innerHTML=ic('mic')+'<span>Falar</span>';
      prim.onclick=()=> listening?stopMic():startMic('capture');
      addBtn('keyboard','Digitar', ()=>openCapture('', 'Digite a frase em espanhol'));
    } else if(s==='corrected'){
      prim.className='btn mic'; prim.innerHTML=ic('mic')+'<span>Repetir e ver nota</span>';
      prim.onclick=repeatPractice;
      guide.textContent = (current&&current.wasCorrect)
        ? 'Você acertou! Repita em voz alta para fixar e ganhar sua nota.'
        : 'Ouça a forma certa e repita em voz alta para ganhar sua nota.';
      addBtn('speaker','Ouvir', ()=> current&&speak(current.corrected,0.9));
      addBtn('pencil','Corrigir', ()=> openCapture(lastSent, 'Corrija o que você quis dizer'));
      addBtn('question','Por quê', explainCurrent);
      addBtn('plus','Nova', resetPractice);
    } else if(s==='scored'){
      prim.className='btn ghost'; prim.innerHTML=ic('repeat')+'<span>Repetir</span>';
      prim.onclick=repeatPractice;
      guide.textContent='Ouça de novo e repita quantas vezes quiser. Quando quiser, vá para a próxima.';
      addBtn('speaker','Ouvir', ()=> current&&speak(current.corrected,0.9));
      addBtn('question','Por quê', explainCurrent);
      addBtn('plus','Nova frase', resetPractice, 'mic');
    }
  }
  // repetir a frase correta e ganhar a nota (Azure; se falhar, Plano B do navegador)
  let repeatBusy=false;
  async function repeatPractice(){
    if(!current || repeatBusy) return;
    repeatBusy=true;
    $('primary').onclick=cancelRepeat;                 // enquanto ouve, tocar = parar
    const code=await azAssess(current.corrected,$('shadowFb'),$('status'),$('primary'));
    repeatBusy=false;
    if(code==='ok'){ setStep('scored'); }
    else if(code==='fallback'){                         // Azure indisponível -> navegador
      startMic('shadow',{target:current.corrected,statusEl:$('status'),micBtn:$('primary'),fbEl:$('shadowFb'),
        onDone:()=>setStep('scored'), onFail:()=>setStep('corrected')});
      $('primary').onclick=cancelRepeat;               // Plano B também cancelável
    } else { setStep('corrected'); }                   // 'nomatch' ou 'cancel' -> pode repetir
  }
  // aborta o que estiver ouvindo (Azure ou navegador) sem deixar preso
  function cancelRepeat(){
    if(azCancel){ const c=azCancel; azCancel=null; c(); return; }
    if(listening){ shadowCanceled=true; shadowOnDone=null; stopMic(); setStep('corrected'); }
  }
  // recebe a lista de alternativas do reconhecedor e mostra o campo editável
  function onCaptured(alts){
    stopMic();
    alts=(alts||[]).map(s=>String(s||'').trim()).filter(Boolean);
    if(!alts.length){ setEl($('status'),'info','Não entendi — toque e fale de novo, ou use Digitar.'); return; }
    lastAlts=alts;
    openCapture(alts[0], 'Você disse — confira e ajuste se precisar');
  }
  // abre o campo editável (usado tanto pela fala quanto pelo botão Digitar)
  function openCapture(text, label){
    lastAlts = text ? [...new Set([text, ...lastAlts])] : [];
    $('captureLabel').textContent = label || 'Digite a frase em espanhol';
    const inp=$('captureInput'); inp.value=text||'';
    $('captureBox').style.display='block'; $('mainControls').style.display='none';
    setEl($('status'),'',''); $('shadowFb').innerHTML='';
    inp.focus(); try{ inp.setSelectionRange(inp.value.length, inp.value.length); }catch(_){}
  }
  function closeCapture(){ $('captureBox').style.display='none'; $('mainControls').style.display='block'; }
  // envia a frase (editada ou não) + as hipóteses pro cérebro
  async function sendCorrect(){
    const text=$('captureInput').value.trim();
    if(!text){ $('captureInput').focus(); return; }
    lastSent=text; closeCapture();
    setEl($('status'),'info','Pensando…'); $('said').textContent='Você disse: “'+text+'”';
    const alts=[...new Set([text, ...lastAlts])].slice(0,5);
    try{
      const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'correct',text,alts})});
      const res=await r.json();
      if(res.error){ setEl($('status'),'err','Erro: '+res.error); return; }
      showResult(res,text);
    }catch(e){ setEl($('status'),'err','Sem conexão com o cérebro (Worker).'); }
  }
  function showResult(res, saidText){
    current=res;
    closeCapture();
    $('placeholder').style.display='none'; $('result').style.display='block';
    $('es').textContent=res.corrected; $('pt').textContent=res.translation_pt||''; $('note').textContent=res.note_pt||'';
    $('said').textContent=saidText?'Você disse: “'+saidText+'”':'';
    $('explainBox').style.display='none'; $('explanation').textContent=''; $('examples').innerHTML=''; $('shadowFb').innerHTML='';
    setEl($('status'),res.wasCorrect?'ok':'info',res.wasCorrect?'¡Perfecto!':'Forma correta');
    setStep('corrected');
    speak(res.corrected,0.95); saveCard(res); updateCount();
  }
  async function explainCurrent(){
    if(!current)return;
    $('explainBox').style.display='block'; $('explanation').textContent='Buscando explicação…'; $('examples').innerHTML='';
    try{
      const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'explain',phrase:current.corrected})});
      const res=await r.json();
      if(res.error){ $('explanation').textContent='Erro: '+res.error; return; }
      $('explanation').textContent=res.explanation_pt||'';
      const box=$('examples'); box.innerHTML='';
      (res.examples||[]).forEach(ex=>{
        const d=document.createElement('div'); d.className='ex';
        const t=document.createElement('div'); t.className='t';
        const a=document.createElement('div'); a.className='ees'; a.textContent=ex.es;
        const b=document.createElement('div'); b.className='ept'; b.textContent=ex.pt;
        t.appendChild(a); t.appendChild(b);
        const btn=document.createElement('button'); btn.innerHTML=ic('speaker'); btn.onclick=()=>speak(ex.es,0.95);
        d.appendChild(t); d.appendChild(btn); box.appendChild(d);
      });
    }catch(e){ $('explanation').textContent='Sem conexão para explicar.'; }
  }
  function resetPractice(){ current=null; closeCapture(); $('result').style.display='none'; $('placeholder').style.display='block';
    setEl($('status'),'',''); $('shadowFb').innerHTML=''; setStep('idle'); }

  // ================== FLASHCARDS + REVISÃO ESPAÇADA ==================
  const KEY='shadow_es_cards';
  function loadCards(){ let a; try{a=JSON.parse(localStorage.getItem(KEY))||[]}catch{a=[]}
    let changed=false;
    for(const c of a){ if(!c.ts){c.ts=Date.now();changed=true;} if(!c.srs){c.srs={due:c.ts,interval:0,ease:2.5,reps:0};changed=true;} }
    if(changed) localStorage.setItem(KEY,JSON.stringify(a));
    return a; }
  function persistCards(cards){ localStorage.setItem(KEY,JSON.stringify(cards.slice(0,1000))); }
  function saveCard(res){
    const cards=loadCards(); const es=res.corrected.trim(); const today=new Date().toISOString().slice(0,10);
    if(cards.some(c=>c.es===es && c.day===today)) return;
    const now=Date.now();
    cards.unshift({es,pt:res.translation_pt||'',note:res.note_pt||'',day:today,ts:now,srs:{due:now,interval:0,ease:2.5,reps:0}});
    persistCards(cards);
  }
  function dueCount(){ const now=Date.now(); return loadCards().filter(c=>c.srs.due<=now).length; }
  function updateCount(){ $('cardCount').textContent=loadCards().length; }

  // SM-2 simplificado
  function schedule(card,grade){
    const s=card.srs, now=Date.now();
    if(grade==='again'){ s.reps=0; s.interval=0; s.due=now+10*60000; return; }
    s.reps=(s.reps||0)+1;
    if(s.reps===1) s.interval = grade==='easy'?3:1;
    else if(s.reps===2) s.interval = grade==='easy'?7:3;
    else s.interval = Math.max(1, Math.round(s.interval*(grade==='easy'?s.ease+0.3:s.ease)));
    if(grade==='easy') s.ease=Math.min(3.0,(s.ease||2.5)+0.1);
    s.due = now + s.interval*DAY;
  }

  function renderCards(){
    updateCount();
    const n=dueCount(); const bar=$('reviewBar');
    if(n>0){ bar.className='reviewbar'; bar.innerHTML=ic('repeat')+'<span>Revisar agora ('+n+')</span>'; bar.disabled=false; }
    else   { bar.className='reviewbar none'; bar.innerHTML='<span>Nada para revisar por enquanto</span>'; bar.disabled=true; }

    const cards=loadCards(); const box=$('cardList');
    if(!cards.length){ box.innerHTML='<div class="empty">Ainda não há cards.<br>Pratique uma frase que ela aparece aqui.</div>'; return; }
    const groups={}; for(const c of cards){(groups[c.day]=groups[c.day]||[]).push(c);}
    const fmtDay=d=>{const t=new Date().toISOString().slice(0,10);const y=new Date(Date.now()-DAY).toISOString().slice(0,10);
      if(d===t)return'Hoje';if(d===y)return'Ontem';const[Y,M,D]=d.split('-');return `${D}/${M}/${Y}`;};
    const fmtDue=due=>{const diff=due-Date.now(); if(diff<=0)return'revisar agora';
      const days=Math.round(diff/DAY); if(days<1)return'em breve'; if(days===1)return'amanhã'; return'em '+days+' dias';};
    box.innerHTML='';
    for(const day of Object.keys(groups)){
      const h=document.createElement('div'); h.className='dayhdr'; h.textContent=fmtDay(day)+' · '+groups[day].length; box.appendChild(h);
      for(const c of groups[day]){
        const el=document.createElement('div'); el.className='fc';
        const t=document.createElement('div'); t.className='txt';
        const a=document.createElement('div'); a.className='fes'; a.textContent=c.es;
        const b=document.createElement('div'); b.className='fpt'; b.textContent=c.pt;
        const du=document.createElement('div'); du.className='due'; du.textContent=fmtDue(c.srs.due);
        t.append(a,b,du); t.onclick=()=>speak(c.es,0.95);
        const play=document.createElement('button'); play.innerHTML=ic('speaker'); play.onclick=()=>speak(c.es,0.95);
        const del=document.createElement('button'); del.innerHTML=ic('trash'); del.onclick=()=>{ if(confirm('Apagar este card?')){ const all=loadCards().filter(x=>x.ts!==c.ts); persistCards(all); renderCards(); } };
        el.append(t,play,del); box.appendChild(el);
      }
    }
  }

  // ---- fluxo de revisão ----
  let reviewCards=null, reviewQueue=null;
  function startReview(){
    reviewCards=loadCards(); const now=Date.now();
    reviewQueue=reviewCards.filter(c=>c.srs.due<=now);
    if(!reviewQueue.length) return;
    $('cardList').style.display='none'; $('reviewBar').style.display='none'; $('reviewPanel').style.display='flex'; $('reviewPanel').classList.add('view');
    renderReviewCard();
  }
  function renderReviewCard(){
    if(!reviewQueue.length){ endReview(true); return; }
    const c=reviewQueue[0];
    $('rvLeft').textContent=reviewQueue.length;
    $('rvPt').textContent=c.pt||'(sem tradução)';
    $('rvEs').textContent=c.es; $('rvEs').style.filter='blur(8px)';
    $('rvNote').textContent='';
    setEl($('rvStatus'),'',''); $('rvFb').innerHTML='';
    $('rvGrades').style.display='none';
  }
  function revealReview(){
    const c=reviewQueue[0]; if(!c)return;
    $('rvEs').style.filter='none'; $('rvNote').textContent=c.note||'';
    $('rvGrades').style.display='flex'; speak(c.es,0.95);
  }
  function gradeReview(grade){
    const c=reviewQueue.shift(); if(!c)return;
    schedule(c,grade); persistCards(reviewCards);
    if(grade==='again') reviewQueue.push(c);       // revê ainda nesta sessão
    renderReviewCard();
  }
  function endReview(done){
    $('reviewPanel').style.display='none'; $('reviewPanel').classList.remove('view');
    $('cardList').style.display='block'; $('reviewBar').style.display='block';
    renderCards();
    if(done){ setEl($('status'),'ok',''); }
  }

  // ================== Navegação ==================
  function show(view){
    const p=view==='practice';
    $('practice').classList.toggle('active',p); $('cards').classList.toggle('active',!p);
    $('tabPractice').classList.toggle('active',p); $('tabCards').classList.toggle('active',!p);
    if(!p){ $('reviewPanel').style.display='none'; $('reviewPanel').classList.remove('view'); $('cardList').style.display='block'; $('reviewBar').style.display='block'; renderCards(); }
  }

  // ================== Eventos ==================
  $('captureRedo').innerHTML=ic('mic')+'<span>Falar de novo</span>';
  $('captureSend').innerHTML=ic('check')+'<span>Está certo</span>';
  $('rvShow').innerHTML=ic('speaker')+'<span>Ouvir & ver</span>';
  $('rvRepeat').innerHTML=ic('mic')+'<span>Repetir</span>';
  $('captureSend').onclick= sendCorrect;
  $('captureRedo').onclick= ()=>{ closeCapture(); startMic('capture'); };
  $('captureInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); sendCorrect(); } });
  $('tabPractice').onclick=()=>show('practice');
  $('tabCards').onclick   =()=>show('cards');
  $('reviewBar').onclick  = startReview;
  $('rvShow').onclick     = revealReview;
  $('rvRepeat').onclick   = async ()=>{ const c=reviewQueue&&reviewQueue[0]; if(!c)return; revealReview();
    const code=await azAssess(c.es,$('rvFb'),$('rvStatus'),$('rvRepeat'));
    if(code==='fallback') startMic('shadow',{target:c.es,statusEl:$('rvStatus'),micBtn:$('rvRepeat'),fbEl:$('rvFb'),
      onFail:()=>setEl($('rvStatus'),'info','Não consegui ouvir — toque em Repetir.')}); };
  $('rvAgain').onclick    = ()=>gradeReview('again');
  $('rvGood').onclick     = ()=>gradeReview('good');
  $('rvEasy').onclick     = ()=>gradeReview('easy');
  $('rvQuit').onclick     = ()=>endReview(false);

  if(!SR){ $('foot').innerHTML='Sem reconhecimento de voz aqui. Abra no <b>Chrome (Android)</b>.'; }
  updateCount();
  setStep('idle');
  // Atualização automática: quando sair uma versão nova, o app recarrega sozinho.
  if('serviceWorker' in navigator){
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange', ()=>{
      if(refreshing) return; refreshing=true; location.reload();
    });
    navigator.serviceWorker.register('sw.js').then(reg=>{
      reg.update();
      setInterval(()=>reg.update().catch(()=>{}), 60*60*1000);   // checa update a cada 1h
      document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) reg.update().catch(()=>{}); });
    }).catch(()=>{});
  }
  </script>
</body>
